name: Publish NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack -c Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} -o ./artifacts

      - name: Push
        run: dotnet nuget push ./artifacts/*.nupkg --source "https://nuget.pkg.github.com/yakikotori/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate